<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c9f8d6"/>
      <stop offset="0.55" stop-color="#bfe6e6"/>
      <stop offset="1" stop-color="#9fc3fd"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#1e3a5f" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- roter Leitfaden: leuchtende Passlinien verbinden das Team -->
  <g stroke-linecap="round" filter="url(#glow)">
    <g stroke="#f97316" stroke-width="26" opacity="0.35">
      <line x1="256" y1="252" x2="148" y2="136"/>
      <line x1="256" y1="252" x2="376" y2="128"/>
      <line x1="256" y1="252" x2="136" y2="366"/>
      <line x1="256" y1="252" x2="372" y2="372"/>
      <line x1="148" y1="136" x2="376" y2="128"/>
    </g>
    <g stroke="#e23b34" stroke-width="11">
      <line x1="256" y1="252" x2="148" y2="136"/>
      <line x1="256" y1="252" x2="376" y2="128"/>
      <line x1="256" y1="252" x2="136" y2="366"/>
      <line x1="256" y1="252" x2="372" y2="372"/>
      <line x1="148" y1="136" x2="376" y2="128"/>
    </g>
  </g>

  <!-- Mitspieler: Magnet-Chips wie auf der Taktiktafel -->
  <g filter="url(#soft)">
    <circle cx="148" cy="136" r="44" fill="#e23b34" stroke="#ffffff" stroke-width="10"/>
    <circle cx="376" cy="128" r="44" fill="#e23b34" stroke="#ffffff" stroke-width="10"/>
    <circle cx="136" cy="366" r="44" fill="#e23b34" stroke="#ffffff" stroke-width="10"/>
    <circle cx="372" cy="372" r="44" fill="#e23b34" stroke="#ffffff" stroke-width="10"/>
  </g>

  <!-- Ballträger in der Mitte -->
  <g filter="url(#soft)">
    <circle cx="256" cy="252" r="62" fill="#e23b34" stroke="#ffffff" stroke-width="12"/>
    <circle cx="304" cy="204" r="24" fill="#f97316" stroke="#ffffff" stroke-width="7"/>
  </g>
</svg>
